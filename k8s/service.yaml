apiVersion: v1
kind: Service
metadata:
  name: my-sre-app
  namespace: default
  labels:
    app: my-sre-app
spec:
  # ClusterIP: internal only (default)
  # NodePort: exposes on a port on each node — useful for local testing
  # LoadBalancer: provisions a cloud load balancer (AWS ELB etc)
  type: ClusterIP
  selector:
    app: my-sre-app  # Routes traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 80        # Port the Service listens on
      targetPort: 5000  # Port on the container
