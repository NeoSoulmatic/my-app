apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-sre-app
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: my-sre-app.local  # Add this to /etc/hosts pointing to minikube IP
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-sre-app
                port:
                  number: 80
